<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Admin Login / BeCa</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 fill=%27%23050706%27/%3E%3Ctext x=%2732%27 y=%2746%27 font-family=%27Georgia,serif%27 font-size=%2742%27 font-weight=%27700%27 fill=%27%23e8b84b%27 text-anchor=%27middle%27%3EB%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="../styles.css?v=specs-1">
</head>
<body class="beca-minimal auth-page">
  <div class="cursor-glow" aria-hidden="true"></div>
  <main class="auth-shell">
    <a class="auth-brand" href="/">
      <img src="../assets/beca-logo.png?v=2" alt="" data-content-img="logoUrl">
    </a>

    <section class="auth-card">
      <p>Admin access</p>
      <h1>Manage drops and clients.</h1>
      <form action="/admin/login" method="post" data-auth-form>
        <label>
          Email
          <input name="email" type="email" autocomplete="email" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Open dashboard</button>
        <span class="form-message" data-form-message></span>
      </form>
    </section>
  </main>

  <script src="../security.js?v=no-block-1"></script>
  <script src="../script.js?v=i18n-1"></script>
  <script src="../auth.js"></script>
</body>
</html>
