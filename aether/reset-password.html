<!doctype html>
<html lang="en" data-force-lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Reset password / &#198;THER ORIGIN</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23151322'/%3E%3Ctext x='32' y='42' font-family='Georgia,serif' font-size='34' fill='%23a496db' text-anchor='middle'%3E%C3%86%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap">
  <link rel="stylesheet" href="styles.css?v=aether-34">
  <link rel="stylesheet" href="aether-theme.css?v=aether-34">
</head>
<body class="beca-minimal auth-page">
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="site-scene" aria-hidden="true">
    <div class="scene-aurora"></div>
    <div class="scene-particles"></div>
    <div class="scene-beams"></div>
  </div>

  <main class="auth-shell">
    <a class="auth-brand" href="/">
      <span class="aether-wordmark">&#198;THER<small>ORIGIN</small></span>
    </a>

    <section class="auth-card">
      <div class="auth-combo-heading">
        <p data-i18n="auth.reset.kicker">Client access</p>
        <h1 data-i18n="auth.reset.title">Choose a new password.</h1>
      </div>

      <form action="/auth/reset-password" method="post" data-auth-form data-reset-password-form>
        <input type="hidden" name="token" data-reset-token>
        <label>
          <span data-i18n="auth.reset.newPassword">New password</span>
          <input name="password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button type="submit" data-i18n="auth.reset.button">Set new password</button>
        <span class="form-message" data-form-message></span>
      </form>
    </section>
  </main>

  <script src="brand-copy.js?v=aether-34"></script>
  <script src="locale.js?v=aether-34"></script>
  <script src="security.js?v=no-block-1"></script>
  <script src="script.js?v=aether-34"></script>
  <script src="auth.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = params.get("token") || "";
      var input = document.querySelector("[data-reset-token]");
      var form = document.querySelector("[data-reset-password-form]");
      var message = form.querySelector("[data-form-message]");
      if (input) input.value = token;
      if (!token) {
        message.dataset.type = "";
        message.textContent = "The reset link is incomplete. Request a new one from the login page.";
        form.querySelector("button[type='submit']").disabled = true;
      }
    })();
  </script>
</body>
</html>
