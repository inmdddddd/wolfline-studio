<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Forgot password / AETHER STUDIO</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23151322'/%3E%3Ctext x='32' y='42' font-family='Georgia,serif' font-size='34' fill='%23c9a86a' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap">
  <link rel="stylesheet" href="styles.css?v=aether-22">
  <link rel="stylesheet" href="aether-theme.css?v=aether-22">
</head>
<body class="beca-minimal auth-page">
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="site-scene" aria-hidden="true">
    <div class="scene-aurora"></div>
    <div class="scene-particles"></div>
    <div class="scene-beams"></div>
  </div>

  <main class="auth-shell">
    <a class="auth-brand" href="/">
      <span class="aether-wordmark">AETHER</span>
    </a>

    <section class="auth-card">
      <div class="auth-combo-heading">
        <p data-i18n="auth.forgot.kicker">Client access</p>
        <h1 data-i18n="auth.forgot.title">Reset your password.</h1>
      </div>

      <form action="/auth/forgot-password" method="post" data-auth-form="no-redirect" data-success-message="Daca exista un cont cu acest email, ai primit un link de resetare. Verifica inbox-ul (si spam).">
        <label>
          <span data-i18n="auth.email">Email</span>
          <input name="email" type="email" autocomplete="email" required>
        </label>
        <button type="submit" data-i18n="auth.forgot.button">Send reset link</button>
        <span class="form-message" data-form-message></span>
      </form>

      <a class="auth-forgot-link" href="/login.html" data-i18n="auth.backToLogin">Back to login</a>
    </section>
  </main>

  <script src="locale.js?v=order-tracking-1"></script>
  <script src="security.js?v=no-block-1"></script>
  <script src="script.js?v=etapa1-1"></script>
  <script src="auth.js"></script>
</body>
</html>
