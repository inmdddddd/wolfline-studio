<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Reset password / BeCa</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 fill=%27%23050706%27/%3E%3Ctext x=%2732%27 y=%2746%27 font-family=%27Georgia,serif%27 font-size=%2742%27 font-weight=%27700%27 fill=%27%23e8b84b%27 text-anchor=%27middle%27%3EB%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=specs-1">
</head>
<body class="beca-minimal auth-page">
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="site-scene" aria-hidden="true">
    <div class="scene-aurora"></div>
    <div class="scene-particles"></div>
    <div class="scene-beams"></div>
  </div>

  <main class="auth-shell">
    <a class="auth-brand" href="/">
      <img src="assets/beca-logo.png?v=2" alt="" data-content-img="logoUrl">
    </a>

    <section class="auth-card">
      <div class="auth-combo-heading">
        <p data-i18n="auth.reset.kicker">Client access</p>
        <h1 data-i18n="auth.reset.title">Choose a new password.</h1>
      </div>

      <form action="/auth/reset-password" method="post" data-auth-form data-reset-password-form>
        <input type="hidden" name="token" data-reset-token>
        <label>
          <span data-i18n="auth.reset.newPassword">New password</span>
          <input name="password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button type="submit" data-i18n="auth.reset.button">Set new password</button>
        <span class="form-message" data-form-message></span>
      </form>
    </section>
  </main>

  <script src="locale.js?v=order-tracking-1"></script>
  <script src="security.js?v=no-block-1"></script>
  <script src="script.js?v=i18n-2"></script>
  <script src="auth.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = params.get("token") || "";
      var input = document.querySelector("[data-reset-token]");
      var form = document.querySelector("[data-reset-password-form]");
      var message = form.querySelector("[data-form-message]");
      if (input) input.value = token;
      if (!token) {
        message.dataset.type = "";
        message.textContent = "Linkul de resetare este incomplet. Cere unul nou din pagina de login.";
        form.querySelector("button[type='submit']").disabled = true;
      }
    })();
  </script>
  <script src="editor.js" defer></script>
  <div class="floating-shop-actions" aria-label="Language">
    <div class="language-switch" aria-label="Language">
      <button type="button" data-lang="en" aria-pressed="true">EN</button>
      <button type="button" data-lang="ro" aria-pressed="false">RO</button>
    </div>
  </div>
</body>
</html>
