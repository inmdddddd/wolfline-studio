<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Client Access / BeCa</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="styles.css?v=cart-checkout-1">
</head>
<body class="beca-minimal auth-page">
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="site-scene" aria-hidden="true">
    <div class="scene-aurora"></div>
    <div class="scene-particles"></div>
    <div class="scene-beams"></div>
  </div>

  <main class="auth-shell auth-shell-wide">
    <a class="auth-brand" href="/">
      <img src="assets/beca-logo.png" alt="">
      <span>x</span>
      <img src="assets/wolfline-intro-logo.png" alt="">
    </a>

    <section class="auth-card auth-combo-card">
      <div class="auth-combo-heading">
        <p>Client access</p>
        <h1>Login or register for drops.</h1>
      </div>

      <div class="auth-tabs" aria-label="Account forms">
        <a href="#login">Login</a>
        <a href="#register">Register</a>
      </div>

      <div class="auth-combo-grid">
        <form id="login" action="/auth/login" method="post" data-auth-form>
          <h2>Login</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Login</button>
          <span class="form-message" data-form-message></span>
        </form>

        <form id="register" action="/auth/register" method="post" data-auth-form>
          <h2>Register</h2>
          <label>
            Name
            <input name="name" type="text" autocomplete="name" minlength="2" required>
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button type="submit">Create account</button>
          <span class="form-message" data-form-message></span>
        </form>
      </div>
    </section>
  </main>

  <script src="security.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
</body>
</html>
